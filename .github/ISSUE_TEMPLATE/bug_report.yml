name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. **Do not include secrets** (passwords, API keys,
        cookies) in logs you paste. For security vulnerabilities, use the
        Security tab → *Report a vulnerability* instead of a public issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See …
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Shelf version/commit, how it's deployed (direct / tunnel / proxy), OS, browser.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "`journalctl -u shelf.service` or console output (redact secrets)."
      render: shell
    validations:
      required: false
