name: CodeQL

# Static security analysis for Python + JS/TS. Results appear under the repo's
# Security → Code scanning tab. (Code scanning is free for public repos; for
# private repos it requires GitHub Advanced Security.)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1" # weekly, Mondays

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # security-extended = the security query set WITHOUT the broad code-quality rules
          # (cyclic-import, unused-variable, empty-except, …) that aren't vulnerabilities and only
          # add noise to the Security tab.
          queries: security-extended
          config: |
            paths-ignore:
              - backend/alembic        # one-shot DB migrations (boilerplate, not an attack surface)
              - backend/tests          # test code is never shipped
              - frontend/dist          # build output
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Analyze
        uses: github/codeql-action/analyze@v3
